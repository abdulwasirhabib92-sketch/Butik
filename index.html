<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIMEES COLLECTION</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Segoe UI',sans-serif;
    background: linear-gradient(135deg,#0b3d2e,#1f7a4a,#f2c94c);
    color:white;
    overflow-x:hidden;
}

/* RUNWAY INTRO */
#intro{
    position:fixed;
    width:100%;
    height:100vh;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
    animation:fadeOut 2s ease 3s forwards;
}

#intro h1{
    font-size:2.5rem;
    letter-spacing:10px;
    animation:zoom 2s ease;
}

@keyframes zoom{
    0%{transform:scale(0.5);opacity:0;}
    100%{transform:scale(1);opacity:1;}
}

@keyframes fadeOut{
    to{opacity:0;visibility:hidden;}
}

/* LOGIN */
.container{
    max-width:400px;
    margin:80px auto;
    background:white;
    color:#333;
    padding:25px;
    border-radius:15px;
}

input,button{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
}

button{
    background:linear-gradient(135deg,#1f7a4a,#f2c94c);
    border:none;
    font-weight:bold;
    cursor:pointer;
}

/* NAV */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px;
    background:rgba(0,0,0,0.7);
    backdrop-filter:blur(10px);
}

.logo{
    font-weight:900;
    letter-spacing:6px;
}

.logo span{
    color:#f2c94c;
}

.logout{
    color:#f2c94c;
    cursor:pointer;
}

/* HERO */
.hero{
    height:60vh;
    background:url("https://images.unsplash.com/photo-1521335629791-ce4aec67dd47?auto=format&fit=crop&w=1400&q=80") center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    position:relative;
}

.hero::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
}

.hero h1{
    font-size:3rem;
    z-index:1;
}

/* PRODUCTS */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:25px;
}

.card{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(242,201,76,0.3);
    border-radius:15px;
    overflow:hidden;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-10px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

.add-btn{
    width:100%;
    padding:10px;
    margin-top:10px;
    background:linear-gradient(135deg,#1f7a4a,#f2c94c);
    border:none;
    cursor:pointer;
    font-weight:bold;
}

/* CART */
#cartBox{
    position:fixed;
    right:20px;
    bottom:20px;
    background:black;
    padding:15px;
    border-radius:10px;
    max-width:250px;
}

.cart-item{
    font-size:14px;
    margin:5px 0;
}

.checkout{
    background:#25D366;
    padding:10px;
    border:none;
    width:100%;
    margin-top:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- RUNWAY INTRO -->
<div id="intro">
    <h1>MIMEES COLLECTION</h1>
</div>

<!-- LOGIN -->
<div class="container" id="authBox">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Enter Store</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

<div class="navbar">
    <div class="logo">M I M E E S <span>COLLECTION</span></div>
    <div>
        <span id="userDisplay"></span> |
        <span class="logout" onclick="logout()">Logout</span>
    </div>
</div>

<div id="welcomeBox" style="padding:15px;text-align:center;"></div>

<div class="hero">
    <h1>Luxury Fashion Redefined ✨</h1>
</div>

<div class="products">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1520975682031-ae4c5d6f9d3b?auto=format&fit=crop&w=800&q=80">
        <div class="card-content">
            <h3>Men’s Fashion</h3>
            <button class="add-btn" onclick="add('Men Fashion')">Add to Cart</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38?auto=format&fit=crop&w=800&q=80">
        <div class="card-content">
            <h3>Ladies Wear</h3>
            <button class="add-btn" onclick="add('Ladies Wear')">Add to Cart</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1600185365926-3a2ce3cdb9eb?auto=format&fit=crop&w=800&q=80">
        <div class="card-content">
            <h3>Sneakers</h3>
            <button class="add-btn" onclick="add('Sneakers')">Add to Cart</button>
        </div>
    </div>

</div>

<!-- CART -->
<div id="cartBox">
    <h3>🛒 Cart</h3>
    <div id="cartItems"></div>
    <button class="checkout" onclick="checkout()">Checkout on WhatsApp</button>
</div>

</div>

<script>

let cart = [];

// LOGIN
function login(){
    let u=document.getElementById("username").value;
    if(!u)return alert("Enter username");

    localStorage.setItem("user",u);
    load();
}

// LOAD
function load(){
    let u=localStorage.getItem("user");

    document.getElementById("authBox").style.display="none";
    document.getElementById("dashboard").style.display="block";
    document.getElementById("userDisplay").innerText=u;

    let users=JSON.parse(localStorage.getItem("users")||"{}");

    if(!users[u]){
        users[u]={first:true};
        localStorage.setItem("users",JSON.stringify(users));
    }

    let box=document.getElementById("welcomeBox");

    if(users[u].first){
        box.innerHTML=`<h2>🎉 Welcome ${u} to MIMEES COLLECTION</h2>`;
        users[u].first=false;
        localStorage.setItem("users",JSON.stringify(users));
    }
}

// CART
function add(item){
    cart.push(item);
    renderCart();
}

function renderCart(){
    let box=document.getElementById("cartItems");
    box.innerHTML="";
    cart.forEach((c,i)=>{
        box.innerHTML+=`<div class="cart-item">${c}</div>`;
    });
}

// CHECKOUT
function checkout(){
    let phone="233591808780";
    let msg="Hello, I want to order: "+cart.join(", ");
    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);
}

// LOGOUT
function logout(){
    localStorage.removeItem("user");
    location.reload();
}

// AUTO LOAD
window.onload=()=>{
    if(localStorage.getItem("user")){
        load();
    }
}
</script>

</body>
</html>
