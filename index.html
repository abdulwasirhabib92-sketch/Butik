<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIMEES COLLECTION</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
    background: linear-gradient(135deg,#ffffff,#eafff3,#1f7a4a,#f2c94c);
    color:#111;
}

/* NAV */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    background:white;
    border-bottom:3px solid #f2c94c;
}

.logo{
    font-weight:900;
    letter-spacing:5px;
}

.logo span{color:#1f7a4a;}

/* LOGIN */
.container{
    max-width:400px;
    margin:80px auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

input,button{
    width:100%;
    padding:12px;
    margin:10px 0;
}

button{
    background:linear-gradient(135deg,#1f7a4a,#f2c94c);
    border:none;
    color:#111;
    font-weight:bold;
    cursor:pointer;
}

/* HERO */
.hero{
    height:55vh;
    background:url("https://images.unsplash.com/photo-1521335629791-ce4aec67dd47?auto=format&fit=crop&w=1400&q=80") center/cover;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    position:relative;
}

.hero::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
}

.hero h1{
    font-size:2.5rem;
    z-index:1;
}

/* PRODUCTS */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{transform:translateY(-8px);}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
    transition:0.5s;
}

.card-content{padding:15px;}

.btn{
    width:100%;
    padding:10px;
    margin-top:10px;
    background:linear-gradient(135deg,#1f7a4a,#f2c94c);
    border:none;
    cursor:pointer;
    font-weight:bold;
}

/* CART */
#cart{
    position:fixed;
    right:15px;
    bottom:15px;
    background:white;
    padding:15px;
    border-radius:10px;
    width:220px;
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.item{
    font-size:13px;
    margin:5px 0;
}

.checkout{
    background:#25D366;
    color:white;
    padding:10px;
    border:none;
    width:100%;
    margin-top:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="container" id="loginBox">
    <h2>MIMEES COLLECTION</h2>
    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="login()">Enter Store</button>
</div>

<!-- DASHBOARD -->
<div id="app" style="display:none;">

<div class="navbar">
    <div class="logo">M I M E E S <span>COLLECTION</span></div>
    <div id="userDisplay"></div>
</div>

<div class="hero">
    <h1>Luxury Fashion Redefined ✨</h1>
</div>

<div class="products">

    <div class="card">
        <img id="menImg">
        <div class="card-content">
            <h3>Men Fashion</h3>
            <button class="btn" onclick="add('Men Fashion')">Add to Cart</button>
        </div>
    </div>

    <div class="card">
        <img id="womenImg">
        <div class="card-content">
            <h3>Women Fashion</h3>
            <button class="btn" onclick="add('Women Fashion')">Add to Cart</button>
        </div>
    </div>

    <div class="card">
        <img id="shoeImg">
        <div class="card-content">
            <h3>Sneakers</h3>
            <button class="btn" onclick="add('Sneakers')">Add to Cart</button>
        </div>
    </div>

</div>

<!-- CART -->
<div id="cart">
    <h3>🛒 Cart</h3>
    <div id="items"></div>
    <button class="checkout" onclick="checkout()">Checkout WhatsApp</button>
</div>

</div>

<script>

let cart=[];

// LOGIN
function login(){
    let u=document.getElementById("user").value;
    if(!u)return;

    localStorage.setItem("user",u);
    load();
}

// LOAD APP
function load(){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("app").style.display="block";

    let u=localStorage.getItem("user");
    document.getElementById("userDisplay").innerText="Hi, "+u;
}

// CART
function add(item){
    cart.push(item);
    render();
}

function render(){
    let box=document.getElementById("items");
    box.innerHTML="";
    cart.forEach(i=>{
        box.innerHTML+=`<div class="item">${i}</div>`;
    });
}

// CHECKOUT
function checkout(){
    let phone="233591808780";
    let msg="Order: "+cart.join(", ");
    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);
}

// IMAGE SLIDER (REAL INTERNET FASHION IMAGES)
const men=[
"https://images.unsplash.com/photo-1520975682031-ae4c5d6f9d3b",
"https://images.unsplash.com/photo-1503342217505-b0a15ec3261c",
"https://images.unsplash.com/photo-1516257984-b1b4d707412e"
];

const women=[
"https://images.unsplash.com/photo-1520975916090-3105956dac38",
"https://images.unsplash.com/photo-1496747611176-843222e1e57c",
"https://images.unsplash.com/photo-1483985988355-763728e1935b"
];

const shoes=[
"https://images.unsplash.com/photo-1600185365926-3a2ce3cdb9eb",
"https://images.unsplash.com/photo-1542291026-7eec264c27ff",
"https://images.unsplash.com/photo-1528701800489-20be3c1c4c1e"
];

let i=0;

function rotate(){
    i=(i+1)%men.length;

    document.getElementById("menImg").src=men[i];
    document.getElementById("womenImg").src=women[i];
    document.getElementById("shoeImg").src=shoes[i];
}

setInterval(rotate,4000);

// AUTO LOGIN
window.onload=()=>{
    if(localStorage.getItem("user")) load();

    document.getElementById("menImg").src=men[0];
    document.getElementById("womenImg").src=women[0];
    document.getElementById("shoeImg").src=shoes[0];
}

</script>

</body>
</html>
