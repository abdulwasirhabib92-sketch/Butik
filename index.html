<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIMEES COLLECTION</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Segoe UI',sans-serif;
    background:#0b0c10;
    color:white;
}

/* LOGIN */
.container{
    max-width:400px;
    margin:80px auto;
    background:white;
    color:#333;
    padding:30px;
    border-radius:15px;
}

input,button{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
}

button{
    background:#ff2e63;
    color:white;
    border:none;
    cursor:pointer;
}

/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    padding:15px 20px;
    background:#000;
}

.logout{
    color:#ff2e63;
    cursor:pointer;
}

/* HERO */
.hero{
    height:60vh;
    background:url("https://images.unsplash.com/photo-1521335629791-ce4aec67dd47?auto=format&fit=crop&w=1400&q=80") center/cover;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    position:relative;
}

.hero::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
}

.hero h1{
    font-size:3rem;
    z-index:1;
}

/* WELCOME */
#welcomeBox{
    padding:20px;
    text-align:center;
}

/* PRODUCTS */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:30px;
}

.card{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    border-radius:15px;
    overflow:hidden;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

.order-btn{
    background:#25D366;
    border:none;
    padding:10px;
    width:100%;
    color:white;
    margin-top:10px;
    cursor:pointer;
    border-radius:8px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="container" id="authBox">
    <h2 id="formTitle">Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="handleAuth()">Login</button>

    <p style="text-align:center;cursor:pointer;color:#ff2e63;" onclick="toggleForm()">
        Don't have an account? Sign up
    </p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

<nav>
    <div>MIMEES COLLECTION</div>
    <div>
        <span id="userDisplay"></span> |
        <span class="logout" onclick="logout()">Logout</span>
    </div>
</nav>

<div id="welcomeBox"></div>

<div class="hero">
    <h1>Style That Defines You ✨</h1>
</div>

<div class="products">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38?auto=format&fit=crop&w=800&q=80">
        <div class="card-content">
            <h3>👗 Ladies Fashion</h3>
            <p>Elegant & modern outfits</p>
            <button class="order-btn" onclick="order('Ladies Fashion')">Order on WhatsApp</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1520975682031-ae4c5d6f9d3b?auto=format&fit=crop&w=800&q=80">
        <div class="card-content">
            <h3>👕 Men's Wear</h3>
            <p>Clean and classy styles</p>
            <button class="order-btn" onclick="order('Mens Wear')">Order on WhatsApp</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1600185365926-3a2ce3cdb9eb?auto=format&fit=crop&w=800&q=80">
        <div class="card-content">
            <h3>👟 Sneakers</h3>
            <p>Street fashion & comfort</p>
            <button class="order-btn" onclick="order('Sneakers')">Order on WhatsApp</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=800&q=80">
        <div class="card-content">
            <h3>👠 Luxury Shoes</h3>
            <p>Premium collection</p>
            <button class="order-btn" onclick="order('Luxury Shoes')">Order on WhatsApp</button>
        </div>
    </div>

</div>

</div>

<script>
let isLogin = true;

// TOGGLE
function toggleForm(){
    isLogin = !isLogin;
    document.getElementById("formTitle").innerText = isLogin ? "Login" : "Sign Up";
}

// AUTH
function handleAuth(){
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    let users = JSON.parse(localStorage.getItem("users")) || {};

    if(isLogin){
        if(users[username] && users[username].password === password){
            localStorage.setItem("currentUser", username);
            loadDashboard();
        } else {
            alert("Invalid login");
        }
    } else {
        users[username] = {password, firstLogin:true};
        localStorage.setItem("users", JSON.stringify(users));
        alert("Account created! Now login.");
        toggleForm();
    }
}

// DASHBOARD
function loadDashboard(){
    let user = localStorage.getItem("currentUser");
    let users = JSON.parse(localStorage.getItem("users"));

    document.getElementById("authBox").style.display="none";
    document.getElementById("dashboard").style.display="block";
    document.getElementById("userDisplay").innerText=user;

    let box=document.getElementById("welcomeBox");

    if(users[user].firstLogin){
        box.innerHTML=`<h2>🎉 Welcome ${user} to MIMEES COLLECTION</h2><p>Your fashion journey starts here ✨</p>`;
        users[user].firstLogin=false;
        localStorage.setItem("users",JSON.stringify(users));
    }else{
        box.innerHTML=`<h2>Welcome back ${user} 👋</h2>`;
    }
}

// WHATSAPP ORDER
function order(item){
    let phone="233591808780";
    let msg=`Hello, I want to order: ${item} from MIMEES COLLECTION`;
    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,"_blank");
}

// LOGOUT
function logout(){
    localStorage.removeItem("currentUser");
    location.reload();
}

// AUTO LOGIN
window.onload=()=>{
    if(localStorage.getItem("currentUser")){
        loadDashboard();
    }
}
</script>

</body>
</html>
